<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fractal Oracle</title>

    <!-- PWA Мета-теги -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/864/864685.png">

    <!-- Подключение стилей и скриптов -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="glCanvas"></canvas>
    <canvas id="attractorCanvas"></canvas>

    <div class="sound-toggle muted" id="btnSound" onclick="toggleSound()">🔇</div>

    <div id="errorBox">
        <h3>⚠️ Ошибка Оракула</h3>
        <pre id="errorText"></pre>
        <button onclick="document.getElementById('errorBox').style.display='none'">Закрыть</button>
    </div>

    <div class="panel-container" id="panel">
        <div class="panel-handle" onclick="togglePanel()">
            <div class="panel-arrow">^</div>
        </div>
        <div class="panel-content">

            <div class="mode-switch">
                <div class="mode-btn active" id="modeClassic" onclick="setMode('classic')">✨ Классика</div>
                <div class="mode-btn" id="modeChaos" onclick="setMode('chaos')">🌪 Хаос</div>
            </div>

            <div class="controls-row">
                <div class="control-group">
                    <label>Фрактал</label>
                    <select id="selectType"></select>
                </div>
                <div class="control-group">
                    <label>Палитра</label>
                    <select id="selectPalette">
                        <option value="0">🌈 Радужная</option>                        <option value="1">⚫ Чёрно-белая</option>
                        <option value="2">🔆 Психоделия</option>
                        <option value="3">🔥 Инферно</option>
                        <option value="4">❔ Пустота</option>
                        <option value="5">🌃 Neon Tokyo</option>
                        <option value="6">🧬 ДНК</option>
                        <option value="7">🌅 Восход</option>
                        <option value="8">🚫 Doom</option>
                    </select>
                </div>
            </div>

            <div class="control-group">
                <label>Сид (Seed)</label>
                <div style="display: flex; gap: 10px; margin-bottom: 5px;">
                    <button class="mode-btn active" style="font-size: 12px; padding: 4px;" id="inputDate" onclick="setInputMode('date')">📅 Дата</button>
                    <button class="mode-btn" style="font-size: 12px; padding: 4px;" id="inputNum" onclick="setInputMode('num')">🔢 Число</button>
                    <button class="mode-btn" style="font-size: 12px; padding: 4px;" id="inputText" onclick="setInputMode('text')">💬 Текст</button>
                </div>
                <div class="seed-input-group">
                    <input type="text" id="seedInput" placeholder="Введите сид..." oninput="updateSeedFromInput()">
                    <button class="seed-btn" id="btnNow" onclick="setDateSeed()" title="Вставить текущее время">🕒</button>
                    <button class="seed-btn" id="btnRandom" onclick="setRandomSeed()" title="Случайное число" style="display:none;">🎲</button>
                </div>
            </div>

            <div class="actions">
                <button class="btn-main" onclick="generate()">🔮 ГЕНЕРИРОВАТЬ</button>
                <button class="btn-sec" onclick="savePNG()">📸 PNG</button>
            </div>

        </div>
    </div>

    <!-- Подключение скриптов (порядок важен!) -->
    <script src="shaders.js"></script>
    <script src="main.js"></script>
    
    <!-- Service Worker для PWA -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW failed', err));
        });
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', e => {
          e.preventDefault();
          deferredPrompt = e;
        });
      }    </script>
</body>
</html>
